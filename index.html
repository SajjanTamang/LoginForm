<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Registration Form</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">


</head>
<body>

    <audio id="clickSound" src="click.mp3" preload="auto"></audio>

    <div class="container" id="container">

        <div class="form-container sign-up">
            <form>
                <h1>Create Account</h1>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>

                <span>or use your email for Registration</span>

                <input type="text" placeholder="Username">
                <input type="email" placeholder="email">
                    <div class="password-box">
                        <input type="password" id="registerPassword" placeholder="Password">
                        <i class="fa-solid fa-eye" id="toggleRegister"></i>
                    </div>

                <button>Sign Up</button>

            </form>
        </div>

        <div class="form-container sign-in">
            <form>
                <h1>Sign In</h1>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>

                <span>or use your email address</span>

                <input type="email" placeholder="email">
                    <div class="password-box">
                        <input type="password" id="loginPassword" placeholder="Password">
                       <i class="fa-solid fa-eye" id="toggleLogin"></i>
                    </div>

                <a href="#">Forgot Password?</a>

                <button>Sign In</button>

            </form>
        </div>

        <div class="toogle-container">
            <div class="toogle">
                    <div class="toogle-panel toogle-left">
                        <h1>Welcome Back!</h1>
                        <p>use your personal details to access our site features</p>
                        <button class="hidden" id="login">Sign In</button>
                    </div>

                    <div class="toogle-panel toogle-right">
                        <h1>Hello, Friend!</h1>
                        <p>Register with your personal details to access our site features</p>
                        <button class="hidden" id="register">Sign Up</button>
                    </div>
            </div>
        </div>

    </div>

</body>

<script src="script.js"></script>
</html>
